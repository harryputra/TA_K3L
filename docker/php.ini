; Konfigurasi PHP produksi — SIAGA POLMAN K3L
memory_limit = 256M
max_execution_time = 60

; Upload foto insiden / hazard / denah
upload_max_filesize = 20M
post_max_size = 25M

; Keamanan
expose_php = Off

; OPcache (produksi: tidak validasi timestamp, kode di-rebuild via image)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
